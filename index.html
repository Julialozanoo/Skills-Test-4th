<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    <title>Attendance Tracker</title>
   
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8a5a5, #ff8b95);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            background: #d4d4d4;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #acd8ae;
        }

        #output {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Attendance Tracker</h1>

        <label>Day:</label>
        <select id="day">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
        </select>

        <label>Absences:</label>
        <input type="number" id="absences">

        <button py-click="add_attendance">Add</button>
        <button py-click="show_graph">Graph</button>

        <div id="output"></div>

        <py-script src="main.py"></py-script>
    </div>
</body>
</html>
